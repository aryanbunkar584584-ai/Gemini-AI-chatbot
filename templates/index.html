<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Heidi AI - Your intelligent chat assistant created by Aryan Bunkar.">

  <title>Heidi AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Manrope', sans-serif;
      margin: 0 auto 40px;
      background-color: #0d1117;
      color: #fff;
    }

    /* Top Navbar */
    .heidi-navbar {
      background: linear-gradient(90deg, #0d1117 0%, #161b27 100%);
      border-bottom: 1px solid #2a3447;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .heidi-logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .heidi-logo span {
      color: #4f8ef7;
    }

    .heidi-creator {
      font-size: 0.78rem;
      color: #6b7a99;
    }

    /* Chat area */
    .chat-wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 120px;
    }

    .welcome-box {
      text-align: center;
      padding: 48px 24px 32px;
    }

    .welcome-box h2 {
      font-size: 2rem;
      font-weight: 700;
    }

    .welcome-box h2 span {
      color: #4f8ef7;
    }

    .welcome-box p {
      color: #8b99b5;
      font-size: 0.95rem;
      margin-top: 8px;
    }

    /* Message bubbles */
    .msg-user {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
      justify-content: flex-end;
    }

    .msg-ai {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }

    .bubble-user {
      background-color: #1e3a6e;
      border-radius: 18px 18px 4px 18px;
      padding: 12px 16px;
      max-width: 75%;
      font-size: 0.93rem;
      color: #e8edf7;
      line-height: 1.6;
    }

    .bubble-ai {
      background-color: #161b27;
      border: 1px solid #2a3447;
      border-radius: 18px 18px 18px 4px;
      padding: 12px 16px;
      max-width: 75%;
      font-size: 0.93rem;
      color: #d1d9ec;
      line-height: 1.6;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .avatar-user {
      background-color: #2a3447;
      color: #8b99b5;
    }

    .avatar-ai {
      background: linear-gradient(135deg, #4f8ef7, #7b5cf5);
      color: white;
      font-size: 0.7rem;
    }

    /* Skeleton loader */
    .skeleton1, .skeleton2, .skeleton3 {
      min-height: 14px;
      padding: 8px;
      border-radius: 4px;
      background-color: #2a3447;
      background-image: linear-gradient(90deg, #2a3447 0px, #3a4a63 40px, #2a3447 80px);
      background-size: 200px 100%;
      background-repeat: no-repeat;
      background-position: left -200px top 0;
      animation: shine 1.2s ease infinite;
      margin-bottom: 8px;
    }

    .skeleton1 { width: 70%; }
    .skeleton2 { width: 50%; }
    .skeleton3 { width: 60%; }

    @keyframes shine {
      to { background-position: right -200px top 0; }
    }

    /* Input bar */
    .input-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #0d1117 80%, transparent);
      padding: 16px;
    }

    .input-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: center;
      background-color: #161b27;
      border: 1px solid #2a3447;
      border-radius: 14px;
      padding: 8px 8px 8px 16px;
    }

    .input-inner input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: 0.95rem;
    }

    .input-inner input::placeholder {
      color: #4a5568;
    }

    .send-btn {
      background: linear-gradient(135deg, #4f8ef7, #7b5cf5);
      border: none;
      border-radius: 10px;
      color: white;
      padding: 10px 20px;
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .send-btn:hover {
      opacity: 0.85;
    }

    .footer-note {
      text-align: center;
      font-size: 0.72rem;
      color: #3a4a5e;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="heidi-navbar">
    <div class="heidi-logo">Heidi <span>AI</span></div>
    <div class="heidi-creator">by Aryan Bunkar</div>
  </nav>

  <!-- Chat area -->
  <div class="chat-wrapper">

    <!-- Welcome message -->
    <div class="welcome-box" id="welcome-box">
      <h2>Welcome to <span>Heidi AI</span></h2>
      <p>Your intelligent assistant — ask me anything!</p>
    </div>

    <!-- Messages will appear here -->
    <div id="list-group"></div>

  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <div class="input-inner">
      <input type="text" id="chat-input" placeholder="Ask Heidi AI anything...">
      <button class="send-btn" id="gpt-button">Send ➤</button>
    </div>
    <p class="footer-note">Heidi AI by Aryan Bunkar</p>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.3.min.js"
    integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous">
  </script>

  <script>
    // Also trigger on Enter key
    $("#chat-input").keypress(function (e) {
      if (e.which === 13) {
        $("#gpt-button").click();
      }
    });

    $("#gpt-button").click(function () {
      var question = $("#chat-input").val().trim();
      if (!question) return;

      // Hide welcome box on first message
      $("#welcome-box").hide();

      // User message bubble
      let user_html = `
        <div class="msg-user">
          <div class="bubble-user">${question}</div>
          <div class="avatar avatar-user">You</div>
        </div>`;

      // Skeleton loader for AI response
      let skeleton_html = `
        <div class="msg-ai" id="loading-skeleton">
          <div class="avatar avatar-ai">AI</div>
          <div class="bubble-ai" style="min-width:180px;">
            <div class="skeleton1"></div>
            <div class="skeleton2"></div>
            <div class="skeleton3"></div>
          </div>
        </div>`;

      $("#chat-input").val("");
      $("#list-group").append(user_html);
      $("#list-group").append(skeleton_html);

      // Scroll to bottom
      $('html, body').animate({ scrollTop: $(document).height() }, 200);

      $.ajax({
        type: "POST",
        url: "/",
        data: { 'prompt': question },
        success: function (data) {
          // Remove skeleton
          $("#loading-skeleton").remove();

          // AI response bubble
          let ai_html = `
            <div class="msg-ai">
              <div class="avatar avatar-ai">AI</div>
              <div class="bubble-ai">
                <p id="typing-demo-${Date.now()}" class="mb-0"></p>
              </div>
            </div>`;

          $("#list-group").append(ai_html);

          // Typing effect
          var targetId = $("p[id^='typing-demo']:last").attr("id");
          var i = 0;
          var speed = 18;

          function typeWriter() {
            if (i < data.length) {
              $("#" + targetId).text($("#" + targetId).text() + data.charAt(i));
              i++;
              setTimeout(typeWriter, speed);
              $('html, body').animate({ scrollTop: $(document).height() }, 50);
            }
          }

          typeWriter();
        },
        error: function () {
          $("#loading-skeleton").remove();
          let err_html = `
            <div class="msg-ai">
              <div class="avatar avatar-ai">AI</div>
              <div class="bubble-ai">Sorry, Heidi AI encountered an error. Please try again!</div>
            </div>`;
          $("#list-group").append(err_html);
        }
      });
    });
  </script>

</body>
  </html>
